# Host nginx (Ubuntu) — proxy to MailFlow Docker frontend
#
# Prereqs:
#   1. In .env set APP_PORT=8080 (Docker frontend on localhost:8080)
#   2. docker compose up -d --build
#   3. sudo cp deploy/nginx-host.conf /etc/nginx/sites-available/mailflow
#   4. sudo ln -sf /etc/nginx/sites-available/mailflow /etc/nginx/sites-enabled/mailflow
#   5. sudo rm -f /etc/nginx/sites-enabled/default   # if it conflicts
#   6. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name sendingmail.chetanchauhan.fun;

    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }
}

# Certbot adds a listen 443 ssl block here automatically.
# map is required for WebSocket upgrade through the host proxy:
# add to /etc/nginx/nginx.conf inside http { } if missing:
#   map $http_upgrade $connection_upgrade {
#       default upgrade;
#       ''      close;
#   }
